name: CTerm
options:
  bundleIdPrefix: com.legato3
  deploymentTarget:
    macOS: "26.0"
  xcodeVersion: "26.2"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.2"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    OTHER_LDFLAGS:
      - -framework Metal
      - -framework MetalKit
      - -framework QuartzCore
      - -framework CoreGraphics
      - -framework Foundation
      - -framework IOKit
      - -framework CoreText
      - -lz
      - -lc++
      - -lsqlite3
    SWIFT_ACTIVE_COMPILATION_CONDITIONS:
      - DEBUG

packages:
  swift-argument-parser:
    url: https://github.com/apple/swift-argument-parser
    from: "1.5.0"

targets:
  CTerm:
    type: application
    platform: macOS
    sources:
      - path: CTerm
        excludes:
          - "**/*.entitlements"
    postBuildScripts:
      - script: |
          cp -R "${PROJECT_DIR}/Resources/ghostty" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/ghostty"
          cp -R "${PROJECT_DIR}/Resources/terminfo" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/terminfo"
        name: Copy Ghostty Resources
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/ghostty
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/terminfo
      - script: |
          mkdir -p "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/bin"
          cp "${BUILT_PRODUCTS_DIR}/cterm" "${BUILT_PRODUCTS_DIR}/${CONTENTS_FOLDER_PATH}/Resources/bin/cterm"
        name: Bundle CTermCLI
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/$(CONTENTS_FOLDER_PATH)/Resources/bin/cterm
    info:
      path: CTerm/Info.plist
      properties:
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        LSApplicationCategoryType: public.app-category.developer-tools
        NSPrincipalClass: NSApplication
        CFBundleDocumentTypes:
          - CFBundleTypeName: Folder
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.folder
        NSServices:
          - NSMenuItem:
              default: Open in CTerm
            NSMessage: openInCTerm
            NSPortName: CTerm
            NSRequiredContext:
              NSTextContent: FilePath
            NSSendTypes:
              - NSFilenamesPboardType
              - public.plain-text
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.legato3.cterm
        PRODUCT_NAME: CTerm
        MARKETING_VERSION: "0.20.3"
        CURRENT_PROJECT_VERSION: 26
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        CODE_SIGN_ENTITLEMENTS: CTerm/CTerm.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: T3F87H6Y8Y
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        release:
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
          OTHER_CODE_SIGN_FLAGS: "--timestamp"
    dependencies:
      - framework: GhosttyKit.xcframework
        embed: false
      - sdk: Carbon.framework
      - sdk: WebKit.framework
      - sdk: UserNotifications.framework
      - sdk: Charts.framework
      - target: CTermCLI
        embed: false

  CTermTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: CTermTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: CTerm

  CTermUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: CTermUITests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: CTerm
    dependencies:
      - target: CTerm

  CTermCLI:
    type: tool
    platform: macOS
    sources:
      - path: CTermCLI
    settings:
      base:
        PRODUCT_NAME: cterm
        PRODUCT_MODULE_NAME: CTermCLI
        SWIFT_VERSION: "6.2"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: T3F87H6Y8Y
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        release:
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
          OTHER_CODE_SIGN_FLAGS: "--timestamp"
    dependencies:
      - package: swift-argument-parser
        product: ArgumentParser

schemes:
  CTerm:
    build:
      targets:
        CTerm: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CTermTests
        - CTermUITests
  CTermTests:
    build:
      targets:
        CTerm: [run, test]
        CTermTests: test
    test:
      config: Debug
      targets:
        - CTermTests
  CTermUITests:
    build:
      targets:
        CTerm: [run, test]
        CTermUITests: test
    test:
      config: Debug
      targets:
        - CTermUITests

fileGroups:
  - CTerm-Bridging-Header.h
